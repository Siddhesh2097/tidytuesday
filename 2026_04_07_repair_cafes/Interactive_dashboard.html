<script type="application/shiny-prerendered" data-context="server-start">
# load libraries
library(tidyverse)
library(conflicted)
library(admiral)
library(polyglotr)
library(countrycode)
library(rnaturalearth)
library(rnaturalearthdata)
library(plotly)
library(arrow)
library(shiny)

# conflicts
conflicts_prefer(dplyr::filter)

# Load required data
data_path <- here::here("2026_04_07_repair_cafes/data/")
repairs <- read_parquet(paste0(data_path, "repairs.parquet"))
electric_non_electric <- read_parquet(paste0(data_path, "electric_non_electric.parquet"))
world_cafes <- readRDS(paste0(data_path, "world_cafes.rds"))

repairs_by_month <- repairs |> 
  mutate(repair_month = floor_date(repair_date, "month")) |> 
  count(repair_month, name = "no_of_repairs")
</script>
 
<script type="application/shiny-prerendered" data-context="server">
repairs_filtered <- reactive({
    repairs |>
        filter(if (input$select_country == "All countries") TRUE else country_name == input$select_country,
        if (input$select_cafe == "All repair cafes") TRUE else repair_cafe_name == input$select_cafe)
})

# Update cafe choices when country changes
observe({
    updateSelectInput(
        session,
        inputId  = "select_cafe",
        choices  = c("All repair cafes", unique(repairs |> 
                        filter(if (input$select_country == "All countries") TRUE 
                               else country_name == input$select_country) |>
                        pull(repair_cafe_name))),
        selected = "All repair cafes"
    )
})

output$plot_no_of_repairs <- renderPlotly({

    p <- repairs_filtered() |>
        mutate(repair_month = floor_date(repair_date, "month")) |> 
  count(repair_month, name = "no_of_repairs") |> 
    ggplot(aes(x = repair_month, y = no_of_repairs)) +
    geom_area(fill = "#e8734a", alpha = 0.3) +               # filled area
    geom_line(color = "#e8734a", linewidth = 0.8) +
    scale_x_date(date_breaks = "1 year", date_labels = "%Y") +
    labs(
    title = paste("Number of repairs in", input$select_country),
    x = "Year",
    y = "Number of repairs"
    ) +
    theme_classic()

    ggplotly(p) |> 
    style(hoverinfo = "none", traces = 1) |> 
    plotly::layout(
    hovermode = "x unified"
    )
})


most_products_pres <- reactive({
    repairs_filtered() |> 
  count(kind_of_product, name = "no_products_presented") |> 
  arrange(desc(no_products_presented)) |> 
  head(10) |> 
  mutate(kind_of_product = fct_reorder(kind_of_product, no_products_presented)) 
})

output$plot_most_presented_products <- renderPlotly({
p <- most_products_pres() |> 
  ggplot(aes(x = kind_of_product, y = no_products_presented, fill = kind_of_product)) +
  geom_bar(stat = "identity") +
  guides(fill = "none") +
  coord_flip() +
  theme_bw() +
  labs(
    title = "Most presented products",
    x = "",
    y = ""
  ) +
  theme(
    axis.ticks = element_blank(),
    panel.background  = element_rect(fill = "white", color = NA),
    plot.background   = element_rect(fill = "white", color = NA),
    panel.border      = element_blank(),    # removes the bw border box
    panel.grid.major.y = element_blank()    # optional: removes horizontal grid lines too
)

ggplotly(p)
})


# Most presented brands by success rate / by number

most_brands <- reactive({
    df <- repairs_filtered() |> 
        filter(!brand %in% c("Unknown/n.a.", "unknown/n.a.", NA)) |> 
        group_by(brand) |> 
        summarise(
            no_products_presented = n(),
            success_rate = sum(repaired == "yes") / n(),   # swap formula here
            .groups = "drop"
        )

    if (input$sort_brands == "Sort by number") {
        df |> 
            arrange(desc(no_products_presented)) |> 
            head(10) |> 
            mutate(brand = fct_reorder(brand, no_products_presented))
    } else {
        df |>
            arrange(desc(success_rate)) |>        
            head(10) |> 
            mutate(brand = fct_reorder(brand, success_rate))
    }
})

output$plot_most_presented_brands <- renderPlotly({

    y_var <- if (input$sort_brands == "Sort by number") "no_products_presented" else "success_rate"
    y_label <- if (input$sort_brands == "Sort by number") "Number of products" else "Success rate"

    p <- most_brands() |> 
        ggplot(aes(x = brand, y = .data[[y_var]])) +
        geom_bar(stat = "identity", fill = "#e75480") +      # pink like screenshot
        coord_flip() +
        labs(title = "Most presented brands", x = "", y = "") +
        theme_bw() +
        theme(
    axis.ticks = element_blank(),
    panel.background  = element_rect(fill = "white", color = NA),
    plot.background   = element_rect(fill = "white", color = NA),
    panel.border      = element_blank(),    # removes the bw border box
    panel.grid.major.y = element_blank()    # optional: removes horizontal grid lines too
)

    ggplotly(p, tooltip = "none")                             # no tooltip needed, numbers already shown
})


</script>
 
<script type="application/shiny-prerendered" data-context="server-extras">
ojs_define <- function(..., .session = shiny::getDefaultReactiveDomain()) {
  quos <- rlang::enquos(...)
  vars <- rlang::list2(...)
  nm <- names(vars)
  if (is.null(nm)) {
    nm <- rep_len("", length(vars))
  }
  mapply(
    function(q, nm, val) {
      # Infer name, if possible
      if (nm == "") {
        tryCatch(
          {
            nm <- rlang::as_name(q)
          },
          error = function(e) {
            code <- paste(collapse = "\n", deparse(rlang::f_rhs(q)))
            stop(
              "ojs_define() could not create a name for the argument: ",
              code
            )
          }
        )
      }
      .session$output[[nm]] <- val
      outputOptions(.session$output, nm, suspendWhenHidden = FALSE)
      .session$sendCustomMessage("ojs-export", list(name = nm))
      NULL
    },
    quos,
    nm,
    vars,
    SIMPLIFY = FALSE,
    USE.NAMES = FALSE
  )
  invisible()
}
</script>

            el,
            cites: cites.split(' ')
          };
        } else {
          return findCites(el.parentElement)
        }
      } else {
        return undefined;
      }
    };
    var bibliorefs = window.document.querySelectorAll('a[role="doc-biblioref"]');
    for (var i=0; i<bibliorefs.length; i++) {
      const ref = bibliorefs[i];
      const citeInfo = findCites(ref);
      if (citeInfo) {
        tippyHover(citeInfo.el, function() {
          var popup = window.document.createElement('div');
          citeInfo.cites.forEach(function(cite) {
            var citeDiv = window.document.createElement('div');
            citeDiv.classList.add('hanging-indent');
            citeDiv.classList.add('csl-entry');
            var biblioDiv = window.document.getElementById('ref-' + cite);
            if (biblioDiv) {
              citeDiv.innerHTML = biblioDiv.innerHTML;
            }
            popup.appendChild(citeDiv);
          });
          return popup.innerHTML;
        });
      }
    }
  });
  </script>
</div> <!-- /container fluid -->
